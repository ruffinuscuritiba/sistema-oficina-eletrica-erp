<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema Oficina & Elétrica</title>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: #0A0B0E; color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
  }
  main { padding: 2rem; max-width: 480px; }
  h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
  p { color: #9ca3af; line-height: 1.5; }
  .badge {
    display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px;
    background: #1A1D28; border: 1px solid #2a2d3a; color: #f5f5f5;
    font-size: 0.8rem; margin-bottom: 1rem;
  }
</style>
</head>
<body>
  <main>
    <div class="badge">Em construção</div>
    <h1>Sistema de Gestão da Oficina</h1>
    <p>Backend modular em desenvolvimento (cadastros, OS &amp; estoque, PDV/financeiro, localização e integrações). A interface web chega em breve.</p>
  </main>
</body>
</html>
