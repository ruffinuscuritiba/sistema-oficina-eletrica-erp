services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://oficina:oficina@postgres:5432/oficina
      PUBLIC_URL: http://localhost:3000
      EVOLUTION_API_URL:
      EVOLUTION_API_KEY:
      EVOLUTION_INSTANCE_NAME:
      OFICINA_NOME: Oficina & Auto Elétrica
      OFICINA_WHATSAPP_NUMERO:
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oficina
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/002_atendimento_ia.sql:/docker-entrypoint-initdb.d/002_atendimento_ia.sql:ro
      - ./db/003_configuracao_oficina.sql:/docker-entrypoint-initdb.d/003_configuracao_oficina.sql:ro
      - ./db/004_notificacoes_controle.sql:/docker-entrypoint-initdb.d/004_notificacoes_controle.sql:ro
      - ./db/005_manutencao_preventiva.sql:/docker-entrypoint-initdb.d/005_manutencao_preventiva.sql:ro

volumes:
  postgres_data:
